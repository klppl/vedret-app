name: Release APK

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        required: true
        default: patch
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Bump version
        id: version
        run: |
          set -euo pipefail
          BUILD_FILE=app/build.gradle.kts
          CURRENT_NAME=$(grep 'versionName = ' "$BUILD_FILE" | head -1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          CURRENT_CODE=$(grep 'versionCode = ' "$BUILD_FILE" | head -1 | sed -E 's/.*versionCode = ([0-9]+).*/\1/')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_NAME"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
            none) ;;
          esac

          NEW_NAME="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$((CURRENT_CODE+1))

          sed -i -E "s/versionName = \"[^\"]+\"/versionName = \"$NEW_NAME\"/" "$BUILD_FILE"
          sed -i -E "s/versionCode = [0-9]+/versionCode = $NEW_CODE/" "$BUILD_FILE"

          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          if [ "${{ inputs.bump }}" = "none" ]; then
            echo "release=0" >> "$GITHUB_OUTPUT"
          else
            echo "release=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore
        run: |
          if [ -z "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is missing. See README/instructions."
            exit 1
          fi
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK
        id: stage
        run: |
          set -euo pipefail
          APK_NAME="vedret-${{ steps.version.outputs.version_name }}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "apk=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.apk }}
          path: ${{ steps.stage.outputs.apk }}
          if-no-files-found: error

      - name: Commit and push version bump
        if: steps.version.outputs.release == '1'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "Release v${{ steps.version.outputs.version_name }} (versionCode ${{ steps.version.outputs.version_code }})"
          git push

      - name: Create GitHub Release
        if: steps.version.outputs.release == '1'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: v${{ steps.version.outputs.version_name }}
          files: ${{ steps.stage.outputs.apk }}
          generate_release_notes: true

      - name: Cleanup keystore
        if: always()
        run: rm -f app/release.keystore
